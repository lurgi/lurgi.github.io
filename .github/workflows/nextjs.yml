name: Deploy Next.js site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up .env file
        run: |
          echo "NEXT_PUBLIC_GA_ID=${{ secrets.GA_ID }}" > .env
          echo "NOTION_SECRET=${{ secrets.NOTION_SECRET }}" >> .env
          echo "NOTION_TOKEN_V2=${{ secrets.NOTION_TOKEN_V2 }}" >> .env
          echo "NOTION_USER_ID=${{ secrets.NOTION_USER_ID }}" >> .env
          echo "NOTION_DATABASE_DEVELOPMENT_ID=${{ secrets.NOTION_DATABASE_DEVELOPMENT_ID }}" >> .env
          echo "NOTION_DATABASE_YOGA_LOGS_ID=${{ secrets.NOTION_DATABASE_YOGA_LOGS_ID }}" >> .env
          echo "NOTION_DATABASE_INSIGHTS_ID=${{ secrets.NOTION_DATABASE_INSIGHTS_ID }}" >> .env
          echo "NOTION_DATABASE_READING_ID=${{ secrets.NOTION_DATABASE_READING_ID }}" >> .env
          echo "NOTION_DATABASE_STUDY_ID=${{ secrets.NOTION_DATABASE_STUDY_ID }}" >> .env

      - name: Install dependencies
        run: npm ci

      - name: Prepare build artifacts
        run: rm -rf .next .artifacts && mkdir -p .artifacts

      - name: Run Notion preflight
        run: npm run notion:preflight

      - name: Build with Next.js
        timeout-minutes: 10
        run: npm run build

      - name: Upload Notion diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: notion-diagnostics
          path: .artifacts/notion-diagnostics.ndjson
          if-no-files-found: ignore

      - name: Add .nojekyll file
        run: echo > ./out/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
